<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Explorer!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Varela+Round&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            overflow: hidden;
            touch-action: manipulation;
        }

        .hebrew-text {
            font-family: 'Varela Round', sans-serif;
        }

        /* Layout Handles */
        .game-layout {
            display: flex;
            flex-direction: column;
        }

        @media (orientation: landscape) {
            .game-layout {
                flex-direction: row;
                align-items: center;
                gap: 2rem;
            }
            .info-section {
                width: 25%; /* Reduced from 35% */
                flex-shrink: 0;
            }
            .grid-section {
                width: 75%; /* Increased from 65% */
                height: 100%;
                display: flex;
                align-items: center;
            }
            .cards-grid {
                height: auto;
                max-height: 90vh;
                width: 100%;
            }
        }

        /* Buttons */
        .option-btn {
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #e2e8f0;
            padding: 0;
            overflow: hidden;
            aspect-ratio: 3/2;
            width: 100%;
            position: relative;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Image/Content Styling */
        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .globe-svg {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Animations */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .correct-anim {
            background-color: #86efac !important;
            box-shadow: 0 4px 0 #22c55e !important;
        }

        .wrong-anim {
            box-shadow: 0 4px 0 #ef4444 !important;
        }

        /* Mode Selection Cards */
        .mode-card {
            transition: transform 0.2s;
        }
        .mode-card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center selection:bg-none select-none p-4 relative">

<!-- Loading Overlay -->
<div id="loading-screen" class="fixed inset-0 bg-blue-50 z-[60] flex items-center justify-center">
    <div class="text-center animate-pulse">
        <div class="text-6xl mb-4">🌍</div>
        <h2 class="text-2xl font-bold text-blue-500">Loading World...</h2>
    </div>
</div>

<!-- Main Menu (Mode Selection) -->
<div id="menu-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-4">
    <h1 class="text-5xl font-bold text-blue-600 mb-2 text-center">World Explorer</h1>
    <p class="text-xl text-gray-500 mb-10 text-center">Choose your game!</p>

    <div class="flex flex-col md:flex-row gap-6 w-full max-w-2xl">
        <button onclick="startGame('flags')"
                class="mode-card flex-1 bg-blue-100 rounded-3xl p-8 border-4 border-blue-200 flex flex-col items-center gap-4 hover:bg-blue-200">
            <span class="text-8xl">🏳️</span>
            <span class="text-3xl font-bold text-blue-700">Flags</span>
        </button>
        <button onclick="startGame('globes')"
                class="mode-card flex-1 bg-green-100 rounded-3xl p-8 border-4 border-green-200 flex flex-col items-center gap-4 hover:bg-green-200">
            <span class="text-8xl">🌍</span>
            <span class="text-3xl font-bold text-green-700">Globes</span>
        </button>
    </div>
</div>

<!-- Game Screen -->
<!-- Increased max-w to 7xl to allow buttons to get bigger -->
<div id="game-screen" class="hidden game-layout w-full max-w-7xl h-full justify-between gap-4">

    <!-- Info Section -->
    <div class="info-section flex flex-col gap-4 w-full h-full justify-start md:justify-center">
        <!-- Header -->
        <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border-b-4 border-blue-100 w-full">
            <button onclick="showMenu()"
                    class="text-sm bg-gray-100 px-3 py-1 rounded-lg hover:bg-gray-200 font-bold text-gray-500">⬅ Menu
            </button>
            <div class="text-2xl font-bold text-blue-500 flex items-center gap-2">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
            <div class="flex gap-1" id="hearts-container">
                <span class="text-2xl text-red-500">❤️</span>
                <span class="text-2xl text-red-500">❤️</span>
                <span class="text-2xl text-red-500">❤️</span>
            </div>
        </div>

        <!-- Question & Hint Area -->
        <div class="flex-grow flex flex-col items-center justify-center text-center py-2 bg-white/50 rounded-2xl md:bg-transparent min-h-[150px]">
            <h1 id="country-name" class="text-3xl md:text-5xl font-bold text-gray-800 break-words w-full leading-tight">
                Loading...</h1>
            <h1 id="country-name-he" dir="rtl"
                class="hebrew-text text-2xl md:text-4xl font-bold text-blue-600 mt-1 mb-2 break-words w-full"></h1>

            <!-- Hint Container -->
            <div id="hint-container"
                 class="w-32 h-24 md:w-48 md:h-36 flex items-center justify-center mt-2 bg-white rounded-xl shadow-sm border-2 border-slate-100 p-2">
                <!-- Hint Content (Flag or Globe) Injected Here -->
            </div>
        </div>
    </div>

    <!-- Grid Section -->
    <div class="grid-section w-full">
        <div class="cards-grid grid grid-cols-2 gap-4 w-full">
            <button onclick="handleGuess(0)" id="btn-0"
                    class="option-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(1)" id="btn-1"
                    class="option-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(2)" id="btn-2"
                    class="option-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(3)" id="btn-3"
                    class="option-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
        </div>
    </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-screen"
     class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl border-b-8 border-gray-200 animate-pop">
        <div class="text-7xl mb-6">🏆</div>
        <h2 class="text-4xl font-bold text-gray-800 mb-2">Game Over!</h2>
        <p class="text-2xl text-gray-600 mb-8">You found <span id="final-score" class="font-bold text-blue-600">0</span>
            countries!</p>
        <button onclick="restartGame()"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-5 px-6 rounded-2xl shadow-[0_4px_0_rgb(29,78,216)] active:shadow-none active:translate-y-1 transition-all transform hover:scale-105">
            Play Again 🔄
        </button>
        <button onclick="showMenu()" class="mt-4 text-gray-400 font-bold hover:text-gray-600">Back to Menu</button>
    </div>
</div>

        { name: "Uzbekistan", hebrew: "אוּזְבֶּקִיסְטָן", code: "uz", iso3: "UZB" },
        { name: "Vanuatu", hebrew: "וָנוּאָטוּ", code: "vu", iso3: "VUT" },
        { name: "Vatican City", hebrew: "קִרְיַת הַוָּתִיקָן", code: "va", iso3: "VAT" },
        { name: "Venezuela", hebrew: "וֶנֶצוּאֶלָה", code: "ve", iso3: "VEN" },
        { name: "Vietnam", hebrew: "וִיֶיטְנָאם", code: "vn", iso3: "VNM" },
        { name: "Yemen", hebrew: "תֵּימָן", code: "ye", iso3: "YEM" },
        { name: "Zambia", hebrew: "זַמְבִּיָה", code: "zm", iso3: "ZMB" },
        { name: "Zimbabwe", hebrew: "זִימְבַּאבְּוֶוה", code: "zw", iso3: "ZWE" }
    ];

    // --- Game State ---
    let score = 0;
    let strikes = 0;
    const maxStrikes = 3;
    let currentMode = 'flags'; // 'flags' or 'globes'
    let currentOptions = [];
    let correctIndex = 0;
    let gameActive = false;
    let countryQueue = [];
    let worldGeoJson = null;

    // --- DOM Elements ---
    const menuScreen = document.getElementById('menu-screen');
    const gameScreen = document.getElementById('game-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const scoreEl = document.getElementById('score');
    const heartsContainer = document.getElementById('hearts-container');
    const countryNameEl = document.getElementById('country-name');
    const countryNameHeEl = document.getElementById('country-name-he');
    const finalScoreEl = document.getElementById('final-score');
    const hintContainer = document.getElementById('hint-container');
    const buttons = [
        document.getElementById('btn-0'),
        document.getElementById('btn-1'),
        document.getElementById('btn-2'),
        document.getElementById('btn-3')
    ];

    // --- Initialization ---
    window.onload = async () => {
        // Load Map Data immediately
        try {
            const response = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
            worldGeoJson = await response.json();
            loadingScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
        } catch (e) {
            console.error("Failed to load map data", e);
            loadingScreen.innerHTML = "<h2 class='text-red-500'>Error loading map data. Please refresh.</h2>";
        }
    };

    function showMenu() {
        gameActive = false;
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
    }

    function startGame(mode) {
        currentMode = mode;
        score = 0;
        strikes = 0;
        countryQueue = shuffleArray([...allCountries]);

        scoreEl.textContent = score;
        updateHearts();

        menuScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        gameScreen.classList.add('flex'); // Ensure flex is on

        gameActive = true;
        generateRound();
    }

    function restartGame() {
        startGame(currentMode);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function updateHearts() {
        let heartsHTML = '';
        for(let i=0; i<maxStrikes; i++) {
            if (i < (maxStrikes - strikes)) {
                heartsHTML += '<span class="text-3xl text-red-500 animate-pop">❤️</span>';
            } else {
                heartsHTML += '<span class="text-3xl text-gray-300">🖤</span>';
            }
        }
        heartsContainer.innerHTML = heartsHTML;
    }

    function generateRound() {
        if (!gameActive) return;

        buttons.forEach(btn => {
            btn.className = "option-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none cursor-pointer";
            btn.disabled = false;
            // Clear overlays
            const overlay = btn.querySelector('.absolute.inset-0');
            if (overlay) overlay.remove();
        });

        if (countryQueue.length === 0) {
            countryQueue = shuffleArray([...allCountries]);
        }

        const correctCountry = countryQueue.pop();

        let distractors = [];
        while (distractors.length < 3) {
            const randomC = allCountries[Math.floor(Math.random() * allCountries.length)];
            if (randomC.name !== correctCountry.name && !distractors.includes(randomC)) {
                distractors.push(randomC);
            }
        }

        currentOptions = shuffleArray([correctCountry, ...distractors]);
        correctIndex = currentOptions.indexOf(correctCountry);

        // Update Text
        countryNameEl.textContent = correctCountry.name;
        countryNameHeEl.textContent = correctCountry.hebrew;

        // --- HINT LOGIC ---
        hintContainer.innerHTML = ''; // Clear hint
        if (currentMode === 'flags') {
            // In Flag mode, show Globe hint
            drawGlobe(hintContainer, correctCountry.iso3, true);
        } else {
            // In Globe mode, show Flag hint
            hintContainer.innerHTML = `<img src="https://flagcdn.com/${correctCountry.code}.svg" alt="Flag Hint" class="w-full h-full object-contain">`;
        }

        // --- BUTTONS LOGIC ---
        buttons.forEach((btn, index) => {
            const country = currentOptions[index];
            btn.innerHTML = ''; // Clear previous

            if (currentMode === 'flags') {
                btn.innerHTML = `<img src="https://flagcdn.com/${country.code}.svg" alt="${country.name}" class="flag-img rounded-lg shadow-sm">`;
            } else {
                // Globe Mode
                const container = document.createElement('div');
                container.className = 'w-full h-full';
                btn.appendChild(container);
                drawGlobe(container, country.iso3, false);
            }
        });
    }

    // --- Globe Rendering (D3.js) ---
    function drawGlobe(container, targetIso3, isHint) {
        const width = container.clientWidth || 300;
        const height = container.clientHeight || 200;

        const svg = d3.select(container).append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("class", "globe-svg");

        // Find feature
        const feature = worldGeoJson.features.find(f => f.id === targetIso3);

        // Projection
        const projection = d3.geoOrthographic()
            .scale(Math.min(width, height) / 2 - 10)
            .translate([width / 2, height / 2])
            .clipAngle(90);

        // Center on country if found, else 0,0
        if (feature) {
            const centroid = d3.geoCentroid(feature);
            projection.rotate([-centroid[0], -centroid[1]]);
        }

        const path = d3.geoPath().projection(projection);

        // 1. Water
        svg.append("path")
            .datum({type: "Sphere"})
            .attr("d", path)
            .attr("fill", "#e0f2fe"); // Light blue water

        // 2. All Land
        svg.selectAll("path.land")
            .data(worldGeoJson.features)
            .enter().append("path")
            .attr("d", path)
            .attr("fill", "#ffffff") // White land
            .attr("stroke", "#94a3b8")
            .attr("stroke-width", 0.5);

        // 3. Target Country
        if (feature) {
            svg.append("path")
                .datum(feature)
                .attr("d", path)
                .attr("fill", "#f59e0b") // Amber-500 highlight
                .attr("stroke", "#b45309")
                .attr("stroke-width", 1);
        }

        // 4. Globe border
         svg.append("path")
            .datum({type: "Sphere"})
            .attr("d", path)
            .attr("fill", "none")
            .attr("stroke", "#cbd5e1")
            .attr("stroke-width", 2);
    }

    function handleGuess(btnIndex) {
        if (!gameActive) return;

        const selectedBtn = buttons[btnIndex];
        const isCorrect = btnIndex === correctIndex;

        if (isCorrect) {
            buttons.forEach(btn => btn.disabled = true);
            score++;
            scoreEl.textContent = score;
            selectedBtn.classList.add('correct-anim');

            setTimeout(() => {
                generateRound();
            }, 800);
        } else {
            strikes++;
            updateHearts();

            selectedBtn.classList.add('shake', 'wrong-anim', 'relative');
            selectedBtn.disabled = true;

            const xOverlay = document.createElement('div');
            xOverlay.className = 'absolute inset-0 flex items-center justify-center bg-white/40 rounded-2xl z-10';
            xOverlay.innerHTML = '<span class="text-red-600 font-extrabold text-7xl md:text-8xl drop-shadow-md animate-pop select-none">X</span>';
            selectedBtn.appendChild(xOverlay);

            if (strikes >= maxStrikes) {
                buttons.forEach(btn => btn.disabled = true);
                setTimeout(endGame, 1500);
            }
        }
    }

    function endGame() {
        gameActive = false;
        finalScoreEl.textContent = score;
        gameOverScreen.classList.remove('hidden');
    }
