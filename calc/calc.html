<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Scientific Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti Library for the celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            overscroll-behavior: none;
            user-select: none; /* Prevent text selection for app-like feel */
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .btn-3d {
            transition: all 0.05s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            top: 0;
            border-bottom-width: 6px; /* Chunkier buttons for kids */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Active state class for JS triggering (keyboard support) */
        .btn-3d:active, .btn-active {
            top: 4px;
            border-bottom-width: 2px;
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        /* Juicy Bounce Animation for the Display */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.2s ease-in-out;
        }

        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-slate-900">

<div class="w-full h-full flex flex-col bg-slate-100">

    <!-- Header -->
    <div class="bg-indigo-500 p-3 flex justify-between items-center text-white select-none shrink-0 shadow-md z-10 relative overflow-hidden">
        <!-- Decorative Background Pattern -->
        <div class="absolute inset-0 opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMiIgZmlsbD0id2hpdGUiLz48L3N2Zz4=')]"></div>

        <div class="flex items-center space-x-2 relative z-10">
            <div class="w-4 h-4 rounded-full bg-red-400 border-2 border-red-500"></div>
            <div class="w-4 h-4 rounded-full bg-yellow-400 border-2 border-yellow-500"></div>
            <div class="w-4 h-4 rounded-full bg-green-400 border-2 border-green-500"></div>
        </div>
        <h1 class="font-bold text-2xl tracking-wide drop-shadow-md relative z-10">Math Wiz 3000</h1>
        <div class="w-12"></div> <!-- Spacer to balance header -->
    </div>

    <!-- Display Screen -->
    <div class="bg-slate-900 p-4 flex flex-col items-end justify-end h-[25vh] min-h-[120px] shrink-0 relative border-b-8 border-slate-800 shadow-inner">
        <div id="history-display"
             class="text-slate-400 text-lg h-8 overflow-hidden mb-1 font-mono tracking-wider w-full text-right whitespace-nowrap opacity-80"></div>
        <div class="flex items-end w-full justify-between mt-2">
            <span class="text-xs text-yellow-400 font-bold bg-slate-800 px-3 py-1 rounded-full border border-slate-700 self-center mb-2 shadow-lg">DEG</span>
            <input type="text" id="display" readonly aria-label="Calculator Display"
                   class="w-full bg-transparent text-white text-6xl sm:text-7xl font-bold text-right outline-none placeholder-slate-700 overflow-x-auto transition-transform origin-right"
                   placeholder="0">
        </div>
    </div>

    <!-- Keypad Area -->
    <div class="flex-1 bg-slate-200 p-3">
        <div class="grid grid-cols-4 grid-rows-8 gap-2 h-full w-full">

            <!-- Advanced Row 1 -->
            <button data-key="(" onclick="appendOperator('(')"
                    class="btn-3d bg-indigo-200 border-indigo-400 text-indigo-900 rounded-xl font-bold text-xl hover:bg-indigo-300 w-full h-full">
                (
            </button>
            <button data-key=")" onclick="appendOperator(')')"
                    class="btn-3d bg-indigo-200 border-indigo-400 text-indigo-900 rounded-xl font-bold text-xl hover:bg-indigo-300 w-full h-full">
                )
            </button>
            <button data-key="^" onclick="appendOperator('^')"
                    class="btn-3d bg-indigo-200 border-indigo-400 text-indigo-900 rounded-xl font-bold text-xl hover:bg-indigo-300 w-full h-full">
                ^
            </button>
            <button data-key="!" onclick="handleScientific('fact')"
                    class="btn-3d bg-indigo-200 border-indigo-400 text-indigo-900 rounded-xl font-bold text-xl hover:bg-indigo-300 w-full h-full">
                x!
            </button>

            <!-- Advanced Row 2 -->
            <button data-key="s" onclick="handleScientific('sin')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                sin
            </button>
            <button data-key="c" onclick="handleScientific('cos')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                cos
            </button>
            <button data-key="t" onclick="handleScientific('tan')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                tan
            </button>
            <button data-key="l" onclick="handleScientific('log')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                log
            </button>

            <!-- Advanced Row 3 -->
            <button data-key="n" onclick="handleScientific('ln')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                ln
            </button>
            <button data-key="e" onclick="insertConstant('e')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl italic hover:bg-purple-300 w-full h-full">
                e
            </button>
            <button data-key="p" onclick="insertConstant('π')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                π
            </button>
            <button data-key="r" onclick="handleScientific('sqrt')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                √
            </button>

            <!-- Control Row -->
            <button data-key="q" onclick="handleScientific('pow')"
                    class="btn-3d bg-purple-200 border-purple-400 text-purple-900 rounded-xl font-bold text-xl hover:bg-purple-300 w-full h-full">
                x²
            </button>
            <button data-key="Escape" onclick="clearDisplay()"
                    class="btn-3d bg-red-400 border-red-600 text-white rounded-xl font-bold text-xl hover:bg-red-500 w-full h-full">
                AC
            </button>
            <button data-key="Backspace" onclick="deleteLast()"
                    class="btn-3d bg-orange-400 border-orange-600 text-white rounded-xl font-bold text-xl hover:bg-orange-500 w-full h-full">
                DEL
            </button>
            <button data-key="/" onclick="appendOperator('/')"
                    class="btn-3d bg-blue-400 border-blue-600 text-white rounded-xl font-bold text-3xl hover:bg-blue-500 w-full h-full">
                ÷
            </button>

            <!-- Numpad -->
            <button data-key="7" onclick="appendNumber('7')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                7
            </button>
            <button data-key="8" onclick="appendNumber('8')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                8
            </button>
            <button data-key="9" onclick="appendNumber('9')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                9
            </button>
            <button data-key="*" onclick="appendOperator('*')"
                    class="btn-3d bg-blue-400 border-blue-600 text-white rounded-xl font-bold text-3xl hover:bg-blue-500 w-full h-full">
                ×
            </button>

            <button data-key="4" onclick="appendNumber('4')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                4
            </button>
            <button data-key="5" onclick="appendNumber('5')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                5
            </button>
            <button data-key="6" onclick="appendNumber('6')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                6
            </button>
            <button data-key="-" onclick="appendOperator('-')"
                    class="btn-3d bg-blue-400 border-blue-600 text-white rounded-xl font-bold text-3xl hover:bg-blue-500 w-full h-full">
                −
            </button>

            <button data-key="1" onclick="appendNumber('1')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                1
            </button>
            <button data-key="2" onclick="appendNumber('2')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                2
            </button>
            <button data-key="3" onclick="appendNumber('3')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                3
            </button>
            <button data-key="+" onclick="appendOperator('+')"
                    class="btn-3d bg-blue-400 border-blue-600 text-white rounded-xl font-bold text-3xl hover:bg-blue-500 w-full h-full">
                +
            </button>

            <!-- Bottom Row -->
            <button data-key="0" onclick="appendNumber('0')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                0
            </button>
            <button data-key="." onclick="appendNumber('.')"
                    class="btn-3d bg-white border-slate-300 text-slate-700 rounded-xl font-bold text-3xl hover:bg-slate-50 w-full h-full">
                .
            </button>
            <button data-key="Enter" onclick="calculate()"
                    class="btn-3d col-span-2 bg-green-400 border-green-600 text-white rounded-xl font-bold text-3xl hover:bg-green-500 shadow-green-200 w-full h-full shadow-[0_0_15px_rgba(74,222,128,0.5)]">
                =
            </button>
        </div>
    </div>
</div>

<!-- Logic -->
<script>
    let displayValue = '';
    let historyValue = '';
    let lastResult = null;
    let lastModifier = '';
    let isResultState = false; // Tracks if the screen shows a fresh calculation result

    const display = document.getElementById('display');
    const historyDisplay = document.getElementById('history-display');

    // --- Visual Logic ---
    function triggerConfetti() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6']
        });
    }

    function triggerBounce() {
        display.parentElement.classList.remove('animate-pop');
        void display.parentElement.offsetWidth; // trigger reflow
        display.parentElement.classList.add('animate-pop');
    }

    function formatString(str) {
        if (!str) return '';
        // Finds all numbers in the string (integers or decimals) and adds commas
        return str.replace(/\d+(\.\d*)?/g, (match) => {
            const parts = match.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return parts.join('.');
        });
    }

    function updateDisplay() {
        const formattedDisplay = formatString(displayValue);
        const formattedHistory = formatString(historyValue);

        display.value = formattedDisplay || '0';
        historyDisplay.textContent = formattedHistory;

        // Scroll logic
        display.scrollLeft = display.scrollWidth;
        historyDisplay.scrollLeft = historyDisplay.scrollWidth;
        triggerBounce();
    }

    function appendNumber(num) {
        // If we are currently showing a result, start a new calculation
        if (isResultState) {
            displayValue = '';
            lastResult = null;
            historyValue = '';
            isResultState = false;
        }

        // Prevent multiple decimals
        if (num === '.' && displayValue.includes('.') && !isOperator(displayValue.slice(-1))) {
            const parts = displayValue.split(/[\+\-\*\/\^\(\)]/);
            const currentNum = parts[parts.length - 1];
            if (currentNum.includes('.')) return;
        }

        displayValue += num;
        updateDisplay();
    }

    function appendOperator(op) {
        // If showing a result, continue using it (e.g., "2" -> "2 +")
        if (isResultState) {
            isResultState = false;
        }

        if (displayValue === '' && op !== '(') return;

        const lastChar = displayValue.slice(-1);
        if (isOperator(lastChar) && op !== '(' && lastChar !== ')') {
            displayValue = displayValue.slice(0, -1) + op;
        } else {
            displayValue += op;
        }
        updateDisplay();
    }

    function insertConstant(constSym) {
        if (isResultState) {
            displayValue = '';
            historyValue = '';
            isResultState = false;
        }
        displayValue += constSym;
        updateDisplay();
    }

    function isOperator(char) {
        return ['+', '-', '*', '/', '^'].includes(char);
    }

    function clearDisplay() {
        displayValue = '';
        historyValue = '';
        lastResult = null;
        lastModifier = '';
        isResultState = false;
        updateDisplay();
    }

    function deleteLast() {
        if (isResultState) {
            clearDisplay();
            return;
        }
        if (displayValue === 'Error') {
            clearDisplay();
            return;
        }
        displayValue = displayValue.toString().slice(0, -1);
        updateDisplay();
    }

    function handleScientific(func) {
        // Scientific functions work on the current display value immediately
        // If showing a result, we just operate on it directly.

        if (displayValue === '') return;

        let valueToProcess = parseFloat(displayValue);

        if (isNaN(valueToProcess) || /[\+\-\*\/\^]/.test(displayValue)) {
            try {
               valueToProcess = evaluateExpression(displayValue);
            } catch {
                return;
            }
        }

        let result = 0;
        let symbol = '';

        switch(func) {
            case 'sin':
                result = Math.sin(valueToProcess * Math.PI / 180);
                symbol = `sin(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'cos':
                result = Math.cos(valueToProcess * Math.PI / 180);
                symbol = `cos(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'tan':
                result = Math.tan(valueToProcess * Math.PI / 180);
                symbol = `tan(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'log':
                if (valueToProcess <= 0) { displayValue = "Error"; updateDisplay(); return; }
                result = Math.log10(valueToProcess);
                symbol = `log(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'ln':
                if (valueToProcess <= 0) { displayValue = "Error"; updateDisplay(); return; }
                result = Math.log(valueToProcess);
                symbol = `ln(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'sqrt':
                if (valueToProcess < 0) { displayValue = "Error"; updateDisplay(); return; }
                result = Math.sqrt(valueToProcess);
                symbol = `√(${parseFloat(valueToProcess.toFixed(4))})`;
                break;
            case 'pow':
                result = Math.pow(valueToProcess, 2);
                symbol = `${parseFloat(valueToProcess.toFixed(4))}²`;
                break;
            case 'fact':
                if (valueToProcess < 0) { displayValue = "Error"; updateDisplay(); return; }
                result = factorial(Math.floor(valueToProcess));
                symbol = `${Math.floor(valueToProcess)}!`;
                break;
        }

        result = parseFloat(result.toFixed(8));
        historyValue = symbol + ' = ' + result;
        displayValue = result.toString();
        lastResult = result;

        // Scientific functions are one-off, they don't chain with "=" like arithmetic
        isResultState = true;
        lastModifier = '';

        updateDisplay();
        triggerConfetti();
    }

    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        if (n > 170) return Infinity;
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
    }

    function evaluateExpression(expr) {
        let cleanExpr = expr
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
            .replace(/\^/g, '**')
            .replace(/π/g, Math.PI)
            .replace(/e/g, Math.E);

        if (!/^[\d\.\+\-\*\/\(\)\s\^e]+$/.test(cleanExpr) && !cleanExpr.includes(Math.PI) && !cleanExpr.includes(Math.E)) {
            // simple guard
        }

        return new Function('return ' + cleanExpr)();
    }

    function calculate() {
        if (displayValue === '') return;

        let expressionToEvaluate = displayValue;

        try {
            // Check if we are repeating the last operation (Result State + stored modifier)
            if (isResultState && lastModifier) {
                expressionToEvaluate = displayValue + lastModifier;
            } else {
                // Extract the last operation for potential future repeat
                // Regex: Finds the last operator and everything following it
                const match = displayValue.match(/([+\-*/^])([^+\-*/^]*)$/);
                if (match) {
                    lastModifier = match[0];
                } else {
                    lastModifier = '';
                }
            }

            const result = evaluateExpression(expressionToEvaluate);

            if (!isFinite(result) || isNaN(result)) {
                displayValue = 'Error';
                isResultState = false;
            } else {
                let finalRes = parseFloat(result.toFixed(8));

                // Update history to show what just happened
                if (isResultState && lastModifier) {
                     // e.g. "2 + 1 ="
                     historyValue = `${displayValue} ${lastModifier} =`;
                } else {
                     // e.g. "1 + 1 ="
                     historyValue = `${displayValue} =`;
                }

                displayValue = finalRes.toString();
                lastResult = finalRes;
                isResultState = true;

                triggerConfetti();
            }
        } catch (e) {
            displayValue = 'Error';
            isResultState = false;
        }
        updateDisplay();
    }

    // Keyboard support with visual feedback
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        let btnSelector = null;

        // Map keys to buttons for visual feedback
        if (/[0-9]/.test(key)) btnSelector = `button[data-key="${key}"]`;
        else if (['+', '-', '*', '/'].includes(key)) btnSelector = `button[data-key="${key}"]`;
        else if (key === 'Enter' || key === '=') btnSelector = `button[data-key="Enter"]`;
        else if (key === 'Backspace') btnSelector = `button[data-key="Backspace"]`;
        else if (key === 'Escape') btnSelector = `button[data-key="Escape"]`;
        else if (key === '.') btnSelector = `button[data-key="."]`;
        else if (key === '(' || key === ')') btnSelector = `button[data-key="${key}"]`;
        else if (key === '^') btnSelector = `button[data-key="^"]`;

        // Highlight button
        if (btnSelector) {
            const btn = document.querySelector(btnSelector);
            if (btn) {
                btn.classList.add('btn-active');
                setTimeout(() => btn.classList.remove('btn-active'), 150);
                // Also trigger the click logic
                btn.click();
                e.preventDefault(); // Prevent double input if focus is weird
            }
        }
    });
</script>
</body>
</html>
