<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Varela+Round&display=swap');

        :root {
            --primary: #4f46e5; /* Indigo 600 */
            --bg-color: #f8fafc; /* Slate 50 */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        .hebrew-text {
            font-family: 'Varela Round', sans-serif;
        }

        /* --- 3D Button Effect --- */
        .game-btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform: translateY(0);
            box-shadow: 0 6px 0 #cbd5e1; /* Slate 300 shadow */
        }

        .game-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 #cbd5e1;
        }

        .game-btn:disabled {
            cursor: default;
            opacity: 0.9;
        }

        /* Mode Selection Cards */
        .mode-card {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .mode-card:hover { transform: scale(1.05); }
        .mode-card:active { transform: scale(0.95); }

        /* --- Animations --- */
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* States */
        .correct-state {
            background-color: #86efac !important; /* Green 300 */
            border-color: #22c55e !important; /* Green 500 */
            box-shadow: 0 6px 0 #15803d !important; /* Green 700 */
        }

        .wrong-state {
            border-color: #fca5a5 !important;
            box-shadow: 0 6px 0 #ef4444 !important;
        }

        /* Map styling */
        .globe-svg { width: 100%; height: 100%; pointer-events: none; }

        /* Grid Layout Logic */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Landscape adjustments for tablets/desktop */
        @media (min-width: 768px) and (orientation: landscape) {
            .game-container {
                flex-direction: row;
                align-items: center;
                gap: 2rem;
                padding: 2rem;
            }
            .top-deck {
                flex: 1;
                height: 100%;
                justify-content: center;
            }
            .bottom-deck {
                flex: 1.5;
                height: 100%;
            }
        }
    </style>
</head>
<body class="text-slate-800">

<!-- Loading Screen -->
<div id="loading-screen" class="fixed inset-0 z-50 bg-indigo-50 flex flex-col items-center justify-center">
    <div class="text-8xl animate-bounce mb-4">🌍</div>
    <div class="w-48 h-3 bg-indigo-200 rounded-full overflow-hidden">
        <div class="h-full bg-indigo-500 animate-pulse w-full origin-left"></div>
    </div>
    <p class="mt-4 text-indigo-400 font-bold tracking-widest uppercase text-sm">Loading World Data...</p>
</div>

<!-- Main Menu -->
<div id="menu-screen" class="hidden fixed inset-0 z-40 bg-slate-50 flex flex-col items-center justify-center p-6">
    <header class="text-center mb-10 animate-pop">
        <h1 class="text-5xl md:text-7xl font-extrabold text-indigo-600 tracking-tight mb-2">World<br/>Explorer</h1>
        <p class="text-slate-400 font-semibold text-lg">Learn geography the fun way!</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-lg">
        <button onclick="startGame('flags')"
                class="mode-card group bg-white p-6 rounded-3xl shadow-xl border-4 border-white hover:border-indigo-100 text-center">
            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-300">🏳️</div>
            <div class="text-2xl font-bold text-slate-700">Flags Mode</div>
            <div class="text-slate-400 text-sm font-semibold mt-1">Guess the country</div>
        </button>

        <button onclick="startGame('globes')"
                class="mode-card group bg-white p-6 rounded-3xl shadow-xl border-4 border-white hover:border-indigo-100 text-center">
            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-300">🌏</div>
            <div class="text-2xl font-bold text-slate-700">Maps Mode</div>
            <div class="text-slate-400 text-sm font-semibold mt-1">Find the location</div>
        </button>
    </div>
</div>

<!-- Gameplay Screen -->
<div id="game-screen" class="hidden game-container">

    <!-- TOP DECK: Stats & Question -->
    <div class="top-deck flex flex-col w-full shrink-0 relative z-10">
        <!-- Header Bar -->
        <div class="flex items-center justify-between mb-2 md:mb-6">
            <button onclick="showMenu()"
                    class="p-2 rounded-xl bg-slate-200 hover:bg-slate-300 transition-colors text-slate-600 font-bold text-sm">
                ✕ QUIT
            </button>

            <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100">
                <div class="flex items-center gap-1">
                    <span class="text-amber-400 text-xl">⭐</span>
                    <span id="score" class="font-extrabold text-slate-700 text-xl">0</span>
                </div>
                <div class="w-px h-6 bg-slate-200"></div>
                <div id="hearts-container" class="flex gap-1 text-xl"></div>
            </div>
        </div>

        <!-- Question Area -->
        <div class="flex-grow flex flex-col items-center justify-center text-center p-2 relative">
            <!-- Hint floating background -->
            <div class="absolute inset-0 bg-indigo-50/50 rounded-3xl -z-10 scale-95 md:scale-100 transform origin-top"></div>

            <h2 class="text-sm font-bold text-indigo-400 uppercase tracking-widest mb-1">Where is</h2>

            <!-- Updated Layout: Hebrew First, Same Size -->
            <h1 id="country-name-he"
                class="hebrew-text text-3xl md:text-5xl text-indigo-600 font-extrabold leading-tight mb-1"
                dir="rtl"></h1>
            <h3 id="country-name" class="text-3xl md:text-5xl font-extrabold text-slate-800 leading-tight mb-4">
                Loading...</h3>

            <!-- Dynamic Hint (Globe/Flag) -->
            <div id="hint-container"
                 class="h-24 w-24 md:h-32 md:w-32 rounded-2xl overflow-hidden shadow-sm bg-white border-4 border-white flex items-center justify-center">
                <!-- Hint content injected here -->
            </div>
        </div>
    </div>

    <!-- BOTTOM DECK: The Grid -->
    <div class="bottom-deck w-full flex-grow mt-4 md:mt-0">
        <div class="grid grid-cols-2 grid-rows-2 gap-3 md:gap-6 h-full w-full">
            <!-- Button template, JS will fill these -->
            <button id="btn-0" onclick="handleGuess(0)"
                    class="game-btn bg-white rounded-3xl border-4 border-white flex items-center justify-center overflow-hidden p-2"></button>
            <button id="btn-1" onclick="handleGuess(1)"
                    class="game-btn bg-white rounded-3xl border-4 border-white flex items-center justify-center overflow-hidden p-2"></button>
            <button id="btn-2" onclick="handleGuess(2)"
                    class="game-btn bg-white rounded-3xl border-4 border-white flex items-center justify-center overflow-hidden p-2"></button>
            <button id="btn-3" onclick="handleGuess(3)"
                    class="game-btn bg-white rounded-3xl border-4 border-white flex items-center justify-center overflow-hidden p-2"></button>
        </div>
    </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-screen"
     class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
    <!-- Changed max-w-sm to max-w-lg for a bigger modal -->
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 text-center shadow-2xl animate-pop relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-indigo-400 to-purple-400"></div>

        <div class="text-7xl mb-4 drop-shadow-md">🏆</div>
        <h2 class="text-4xl font-extrabold text-slate-800 mb-6">Game Over!</h2>

        <!-- Added container for correct answer -->
        <div id="last-answer-display" class="mb-8 hidden"></div>

        <p class="text-slate-500 mb-8 font-semibold text-xl">You got <span id="final-score"
                                                                           class="text-indigo-600 text-3xl font-bold">0</span>
            countries.</p>

        <button onclick="restartGame()"
                class="w-full bg-indigo-500 hover:bg-indigo-600 text-white text-2xl font-bold py-5 rounded-2xl shadow-[0_4px_0_rgb(67,56,202)] active:shadow-none active:translate-y-1 transition-all mb-4">
            Play Again
        </button>
        <button onclick="showMenu()" class="text-slate-400 font-bold hover:text-slate-600 text-base">Back to Main Menu
        </button>
    </div>
</div>

    /* --- GAME STATE --- */
    let score = 0;
    let strikes = 0;
    const maxStrikes = 3;
    let currentMode = 'flags';
    let currentOptions = [];
    let correctIndex = 0;
    let gameActive = false;
    let countryQueue = [];
    let worldGeoJson = null;
    let zoomStates = [false, false, false, false];

    /* --- DOM ELEMENTS --- */
    const screens = {
        loading: document.getElementById('loading-screen'),
        menu: document.getElementById('menu-screen'),
        game: document.getElementById('game-screen'),
        over: document.getElementById('game-over-screen')
    };

    const ui = {
        score: document.getElementById('score'),
        hearts: document.getElementById('hearts-container'),
        cName: document.getElementById('country-name'),
        cNameHe: document.getElementById('country-name-he'),
        hint: document.getElementById('hint-container'),
        finalScore: document.getElementById('final-score'),
        buttons: [
            document.getElementById('btn-0'),
            document.getElementById('btn-1'),
            document.getElementById('btn-2'),
            document.getElementById('btn-3')
        ]
    };

    /* --- INITIALIZATION --- */
    window.onload = async () => {
        try {
            const res = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
            worldGeoJson = await res.json();
            screens.loading.classList.add('hidden');
            screens.menu.classList.remove('hidden');
            screens.menu.classList.add('flex');
        } catch (e) {
            console.error(e);
            screens.loading.innerHTML = "<h2 class='text-red-500 font-bold'>Failed to load map data.<br>Check connection.</h2>";
        }
    };

    function showMenu() {
        gameActive = false;
        screens.game.classList.add('hidden');
        screens.over.classList.add('hidden');
        screens.menu.classList.remove('hidden');
        screens.menu.classList.add('flex');
    }

    function startGame(mode) {
        currentMode = mode;
        score = 0;
        strikes = 0;
        countryQueue = shuffleArray([...allCountries]);

        updateUI();

        screens.menu.classList.add('hidden');
        screens.menu.classList.remove('flex');
        screens.over.classList.add('hidden');
        screens.game.classList.remove('hidden');
        screens.game.classList.add('flex');

        gameActive = true;
        generateRound();
    }

    function restartGame() {
        startGame(currentMode);
    }

    /* --- LOGIC --- */
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function updateUI() {
        ui.score.textContent = score;
        let heartsHTML = '';
        for(let i=0; i<maxStrikes; i++) {
            if (i < (maxStrikes - strikes)) {
                heartsHTML += '<span class="text-rose-500 animate-pop">❤</span>';
            } else {
                heartsHTML += '<span class="text-slate-300">❤</span>';
            }
        }
        ui.hearts.innerHTML = heartsHTML;
    }

    function toggleZoom(e, index, iso3) {
        e.stopPropagation(); // Prevent triggering the guess

        // Don't toggle if game inactive or button disabled
        if (!gameActive || ui.buttons[index].disabled) return;

        zoomStates[index] = !zoomStates[index];
        const btn = ui.buttons[index];
        const container = btn.querySelector('.globe-container');

        // Redraw
        drawGlobe(container, iso3, false, zoomStates[index]);

        // Update Icon
        const svg = e.currentTarget.querySelector('svg');
        if (zoomStates[index]) {
            // Zoom Out icon (minus)
            svg.innerHTML = '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line>';
            e.currentTarget.classList.add('bg-indigo-100', 'text-indigo-700');
            e.currentTarget.classList.remove('bg-white/90', 'text-indigo-600');
        } else {
            // Zoom In icon (plus)
            svg.innerHTML = '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line>';
            e.currentTarget.classList.remove('bg-indigo-100', 'text-indigo-700');
            e.currentTarget.classList.add('bg-white/90', 'text-indigo-600');
        }
    }

    function generateRound() {
        if (!gameActive) return;

        zoomStates = [false, false, false, false];

        // Reset Buttons
        ui.buttons.forEach(btn => {
            btn.className = "game-btn bg-white rounded-3xl border-4 border-white flex items-center justify-center overflow-hidden p-2 relative";
            btn.disabled = false;
            btn.innerHTML = '';
        });

        if (countryQueue.length === 0) {
            countryQueue = shuffleArray([...allCountries]);
        }

        const correctCountry = countryQueue.pop();

        let distractors = [];
        while (distractors.length < 3) {
            const randomC = allCountries[Math.floor(Math.random() * allCountries.length)];
            if (randomC.name !== correctCountry.name && !distractors.includes(randomC)) {
                distractors.push(randomC);
            }
        }

        currentOptions = shuffleArray([correctCountry, ...distractors]);
        correctIndex = currentOptions.indexOf(correctCountry);

        // Update Header
        ui.cName.textContent = correctCountry.name;
        ui.cNameHe.textContent = correctCountry.hebrew;

        // Hint Logic
        ui.hint.innerHTML = '';
        if (currentMode === 'flags') {
            // Hint is Map (non-interactive)
            drawGlobe(ui.hint, correctCountry.iso3, true, false);
        } else {
            // Hint is Flag (Maps Mode)
            // Fix: Use object-contain to prevent cropping
            ui.hint.innerHTML = `<img src="https://flagcdn.com/${correctCountry.code}.svg" alt="Flag Hint" class="w-full h-full object-contain">`;
        }

        // Button Content Logic
        ui.buttons.forEach((btn, index) => {
            const country = currentOptions[index];
            if (currentMode === 'flags') {
                btn.innerHTML = `<img src="https://flagcdn.com/${country.code}.svg" alt="Flag" class="w-full h-full object-contain pointer-events-none drop-shadow-sm">`;
            } else {
                // Add Zoom Button
                const zoomBtn = document.createElement('button');
                zoomBtn.className = 'absolute top-2 right-2 z-30 bg-white/90 hover:bg-white text-indigo-600 p-2 rounded-full shadow-md transition-transform active:scale-95 border border-indigo-100';
                zoomBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
                zoomBtn.onclick = (e) => toggleZoom(e, index, country.iso3);
                btn.appendChild(zoomBtn);

                // Wrap D3 in a container that fills the button
                const container = document.createElement('div');
                container.className = 'globe-container w-full h-full flex items-center justify-center';
                btn.appendChild(container);

                requestAnimationFrame(() => drawGlobe(container, country.iso3, false, false));
            }
        });
    }

    function handleGuess(btnIndex) {
        if (!gameActive) return;

        const selectedBtn = ui.buttons[btnIndex];
        const isCorrect = btnIndex === correctIndex;

        // Disable Zoom buttons on all cards
        ui.buttons.forEach(btn => {
            const zoomBtn = btn.querySelector('button');
            if(zoomBtn) zoomBtn.disabled = true;
        });

        if (isCorrect) {
            ui.buttons.forEach(btn => btn.disabled = true);
            score++;
            selectedBtn.classList.add('correct-state');

            // Add checkmark overlay
            const check = document.createElement('div');
            check.className = 'absolute inset-0 flex items-center justify-center bg-green-400/20 z-20 animate-pop';
            check.innerHTML = '<span class="text-green-600 text-6xl font-black drop-shadow-md">✓</span>';
            selectedBtn.appendChild(check);

            setTimeout(() => {
                updateUI();
                generateRound();
            }, 800);
        } else {
            strikes++;
            updateUI();

            selectedBtn.classList.add('shake', 'wrong-state');
            selectedBtn.disabled = true;

            // Add X overlay
            const x = document.createElement('div');
            x.className = 'absolute inset-0 flex items-center justify-center bg-red-400/20 z-20 animate-pop';
            x.innerHTML = '<span class="text-red-500 text-6xl font-black drop-shadow-md">✕</span>';
            selectedBtn.appendChild(x);

            if (strikes >= maxStrikes) {
                ui.buttons.forEach(btn => btn.disabled = true);
                setTimeout(() => {
                    // Pass the correct answer to endGame
                    endGame(currentOptions[correctIndex]);
                }, 1000);
            }
        }
    }

    function endGame(lastCorrectCountry) {
        gameActive = false;
        ui.finalScore.textContent = score;

        const lastAnswerEl = document.getElementById('last-answer-display');
        if (lastCorrectCountry) {
             lastAnswerEl.innerHTML = `
                <p class="text-lg text-slate-400 mb-4 font-bold uppercase tracking-wider">The correct answer was</p>
                <div class="flex flex-col md:flex-row items-center justify-center gap-6 text-3xl font-bold text-slate-700 bg-slate-50 p-6 rounded-3xl border-4 border-slate-100">
                    <img src="https://flagcdn.com/${lastCorrectCountry.code}.svg" class="w-24 h-auto object-cover rounded-lg shadow-md">
                    <div class="flex flex-col">
                        <span>${lastCorrectCountry.name}</span>
                        <span class="hebrew-text text-2xl text-indigo-500 mt-1" dir="rtl">${lastCorrectCountry.hebrew}</span>
                    </div>
                </div>
             `;
             lastAnswerEl.classList.remove('hidden');
        } else {
             lastAnswerEl.classList.add('hidden');
        }

        screens.over.classList.remove('hidden');
    }

    /* --- D3 MAP RENDERING --- */
    function drawGlobe(container, targetIso3, isHint, isZoomed) {
        // Clear previous
        container.innerHTML = '';

        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select(container).append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("class", "globe-svg");

        const feature = worldGeoJson.features.find(f => f.id === targetIso3);

        const projection = d3.geoOrthographic()
            .clipAngle(90);

        // 1. Initial Scale/Rotation
        const defaultScale = Math.min(width, height) / 2 - (isHint ? 5 : 10);

        projection.scale(defaultScale).translate([width/2, height/2]);

        if (feature) {
            const centroid = d3.geoCentroid(feature);
            projection.rotate([-centroid[0], -centroid[1]]);
        } else {
            projection.rotate([0, 0]);
        }

        // 2. Apply Zoom if active
        if (isZoomed && feature) {
            // fitExtent adjusts scale and translate to fit the bounding box
            // We give it some padding so it doesn't touch the edges
            const padding = 20;
            projection.fitExtent([[padding, padding], [width - padding, height - padding]], feature);

            // Note: fitExtent works on the projected feature.
            // Since we already rotated the globe to center the feature,
            // fitExtent essentially "zooms in" on that centered aspect.
        }

        const path = d3.geoPath().projection(projection);

        // 1. Ocean (Only visible if not zoomed in too much, or it becomes background)
        svg.append("path")
            .datum({type: "Sphere"})
            .attr("d", path)
            .attr("fill", "#e0f2fe"); // Sky 100

        // 2. Land
        svg.selectAll("path.land")
            .data(worldGeoJson.features)
            .enter().append("path")
            .attr("d", path)
            .attr("fill", "#ffffff")
            .attr("stroke", "#94a3b8") // Slate 400
            .attr("stroke-width", isZoomed ? 0.2 : 0.5); // Thinner strokes when zoomed

        // 3. Highlight
        if (feature) {
            svg.append("path")
                .datum(feature)
                .attr("d", path)
                .attr("fill", "#fbbf24") // Amber 400
                .attr("stroke", "#d97706") // Amber 600
                .attr("stroke-width", isZoomed ? 1.5 : 1);
        }

        // 4. Border (Sphere outline)
         svg.append("path")
            .datum({type: "Sphere"})
            .attr("d", path)
            .attr("fill", "none")
            .attr("stroke", "#cbd5e1")
            .attr("stroke-width", 2);
    }
</script>
</body>
</html>
