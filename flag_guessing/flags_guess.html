<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Fun!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Varela+Round&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            /* Allow scrolling on very small screens if needed, but hide usually */
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Hebrew font support */
        .hebrew-text {
            font-family: 'Varela Round', sans-serif;
        }

        /* Responsive container that handles landscape nicely */
        .game-layout {
            display: flex;
            flex-direction: column;
        }

        /* Force side-by-side on landscape orientation for tablets/phones */
        @media (orientation: landscape) {
            .game-layout {
                flex-direction: row;
                align-items: center;
                gap: 2rem;
            }
            .info-section {
                width: 35%;
                flex-shrink: 0;
            }
            .grid-section {
                width: 65%;
                height: 100%;
                display: flex;
                align-items: center;
            }
            .cards-grid {
                height: auto;
                max-height: 90vh;
                width: 100%;
            }
        }

        .flag-btn {
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #e2e8f0;
            padding: 0;
            overflow: hidden;
            aspect-ratio: 3/2;
            width: 100%;
            position: relative; /* For absolute positioning of X overlay */
        }

        .flag-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .flag-img {
            width: 100%;
            height: 100%;
            /* CHANGED: contain ensures the full flag is seen (e.g. Nepal, Switzerland) */
            object-fit: contain;
            pointer-events: none;
        }

        /* Animation classes */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .pop {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .correct-anim {
            background-color: #86efac !important; /* Green-300 */
            box-shadow: 0 4px 0 #22c55e !important;
        }

        .wrong-anim {
            /* Background won't show behind image, but shadow will update */
            box-shadow: 0 4px 0 #ef4444 !important;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center selection:bg-none select-none p-4">

<!-- Main Game Container -->
<div id="game-screen" class="game-layout w-full max-w-5xl h-full justify-between gap-4">

    <!-- Left/Top Section: Info & Question -->
    <div class="info-section flex flex-col gap-4 w-full">
        <!-- Stats Header -->
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-100 w-full">
            <div class="text-3xl font-bold text-blue-500 flex items-center gap-2">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
            <div class="flex gap-1" id="hearts-container">
                <span class="text-3xl text-red-500">❤️</span>
                <span class="text-3xl text-red-500">❤️</span>
                <span class="text-3xl text-red-500">❤️</span>
            </div>
        </div>

        <!-- Question Text -->
        <div class="flex-grow flex flex-col items-center justify-center text-center py-4 bg-white/50 rounded-2xl md:bg-transparent">
            <p class="text-gray-500 text-xl mb-2 font-semibold">Where is...</p>
            <h1 id="country-name" class="text-4xl md:text-5xl font-bold text-gray-800 break-words w-full leading-tight">
                Loading...
            </h1>
            <!-- Hebrew Name Container -->
            <h2 id="country-name-he" dir="rtl"
                class="hebrew-text text-3xl md:text-4xl font-bold text-blue-600 mt-2 break-words w-full animate-bounce-short">
            </h2>
        </div>
    </div>

    <!-- Right/Bottom Section: Flag Grid -->
    <div class="grid-section w-full">
        <div class="cards-grid grid grid-cols-2 gap-4 w-full">
            <button onclick="handleGuess(0)" id="btn-0"
                    class="flag-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(1)" id="btn-1"
                    class="flag-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(2)" id="btn-2"
                    class="flag-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
            <button onclick="handleGuess(3)" id="btn-3"
                    class="flag-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none"></button>
        </div>
    </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-screen"
     class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
    <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl border-b-8 border-gray-200 animate-pop">
        <div class="text-7xl mb-6">🏆</div>
        <h2 class="text-4xl font-bold text-gray-800 mb-2">Game Over!</h2>
        <p class="text-2xl text-gray-600 mb-8">You found <span id="final-score" class="font-bold text-blue-600">0</span>
            flags!</p>

        <button onclick="restartGame()"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-5 px-6 rounded-2xl shadow-[0_4px_0_rgb(29,78,216)] active:shadow-none active:translate-y-1 transition-all transform hover:scale-105">
            Play Again 🔄
        </button>
    </div>
</div>

        { name: "United Arab Emirates", hebrew: "אִיחוּד הָאֱמִירוּיוֹת הָעֲרָבִיּוֹת", code: "ae" },
        { name: "United Kingdom", hebrew: "הַמַּמְלָכָה הַמְּאוּחֶדֶת", code: "gb" },
        { name: "United States", hebrew: "אַרְצוֹת הַבְּרִית", code: "us" },
        { name: "Uruguay", hebrew: "אוּרוּגְוַואי", code: "uy" },
        { name: "Uzbekistan", hebrew: "אוּזְבֶּקִיסְטָן", code: "uz" },
        { name: "Vanuatu", hebrew: "וָנוּאָטוּ", code: "vu" },
        { name: "Vatican City", hebrew: "הַוָּתִיקָן", code: "va" },
        { name: "Venezuela", hebrew: "וֶנֶצוּאֶלָה", code: "ve" },
        { name: "Vietnam", hebrew: "וִיֶיטְנָאם", code: "vn" },
        { name: "Yemen", hebrew: "תֵּימָן", code: "ye" },
        { name: "Zambia", hebrew: "זַמְבִּיָה", code: "zm" },
        { name: "Zimbabwe", hebrew: "זִימְבַּאבְּוֶוה", code: "zw" }
    ];

    let score = 0;
    let strikes = 0;
    const maxStrikes = 3;
    let currentOptions = [];
    let correctIndex = 0;
    let gameActive = false;
    let countryQueue = [];

    // DOM Elements
    const scoreEl = document.getElementById('score');
    const heartsContainer = document.getElementById('hearts-container');
    const countryNameEl = document.getElementById('country-name');
    const countryNameHeEl = document.getElementById('country-name-he');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');
    const buttons = [
        document.getElementById('btn-0'),
        document.getElementById('btn-1'),
        document.getElementById('btn-2'),
        document.getElementById('btn-3')
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function updateHearts() {
        let heartsHTML = '';
        for(let i=0; i<maxStrikes; i++) {
            if (i < (maxStrikes - strikes)) {
                heartsHTML += '<span class="text-3xl text-red-500 animate-pop">❤️</span>';
            } else {
                heartsHTML += '<span class="text-3xl text-gray-300">🖤</span>';
            }
        }
        heartsContainer.innerHTML = heartsHTML;
    }

    function generateRound() {
        if (!gameActive) return;

        buttons.forEach(btn => {
            // Reset styles, remove previous X overlays
            btn.className = "flag-btn bg-white rounded-2xl flex items-center justify-center border-4 border-white hover:border-blue-100 focus:outline-none cursor-pointer";
            btn.disabled = false;
        });

        if (countryQueue.length === 0) {
            countryQueue = shuffleArray([...allCountries]);
        }

        const correctCountry = countryQueue.pop();

        let distractors = [];
        while (distractors.length < 3) {
            const randomC = allCountries[Math.floor(Math.random() * allCountries.length)];
            if (randomC.name !== correctCountry.name && !distractors.includes(randomC)) {
                distractors.push(randomC);
            }
        }

        currentOptions = shuffleArray([correctCountry, ...distractors]);
        correctIndex = currentOptions.indexOf(correctCountry);

        // Update Name Elements
        countryNameEl.textContent = correctCountry.name;
        countryNameHeEl.textContent = correctCountry.hebrew;

        buttons.forEach((btn, index) => {
            const country = currentOptions[index];
            // Reset content cleanly
            btn.innerHTML = `<img src="https://flagcdn.com/${country.code}.svg" alt="${country.name}" class="flag-img rounded-lg shadow-sm">`;
        });
    }

    function handleGuess(btnIndex) {
        if (!gameActive) return;

        const selectedBtn = buttons[btnIndex];
        const isCorrect = btnIndex === correctIndex;

        if (isCorrect) {
            // Correct Logic
            buttons.forEach(btn => btn.disabled = true); // Lock all buttons
            score++;
            scoreEl.textContent = score;
            selectedBtn.classList.add('correct-anim');

            // Play sound effect (optional/browser policy dependent) or visual flair
            setTimeout(() => {
                generateRound();
            }, 800);
        } else {
            // Wrong Logic
            strikes++;
            updateHearts();

            // Visuals for wrong guess: Enable relative positioning for the overlay
            selectedBtn.classList.add('shake', 'wrong-anim', 'relative');
            selectedBtn.disabled = true; // Disable ONLY the wrong button

            // Add big red X overlay
            const xOverlay = document.createElement('div');
            xOverlay.className = 'absolute inset-0 flex items-center justify-center bg-white/40 rounded-2xl z-10';
            xOverlay.innerHTML = '<span class="text-red-600 font-extrabold text-7xl md:text-8xl drop-shadow-md animate-pop select-none">X</span>';
            selectedBtn.appendChild(xOverlay);

            if (strikes >= maxStrikes) {
                buttons.forEach(btn => btn.disabled = true); // Lock all buttons on Game Over
                setTimeout(endGame, 1500);
            }
            // Do NOT advance round, allow user to try again
        }
    }

    function endGame() {
        gameActive = false;
        finalScoreEl.textContent = score;
        gameOverScreen.classList.remove('hidden');
    }

    function restartGame() {
        score = 0;
        strikes = 0;
        countryQueue = shuffleArray([...allCountries]);

        scoreEl.textContent = score;
        updateHearts();
        gameOverScreen.classList.add('hidden');
        gameActive = true;

        generateRound();
    }

    // Initialize
    restartGame();

</script>
